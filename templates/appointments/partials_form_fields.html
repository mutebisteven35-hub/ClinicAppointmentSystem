{% if form.non_field_errors %}
    <div class="form-errors">{{ form.non_field_errors }}</div>
{% endif %}
{% for field in form %}
    <div class="field">
        {{ field.label_tag }}
        {{ field }}
        {% if field.help_text %}
            <small>{{ field.help_text }}</small>
        {% endif %}
        {% for error in field.errors %}
            <small class="error">{{ error }}</small>
        {% endfor %}
    </div>
{% endfor %}
