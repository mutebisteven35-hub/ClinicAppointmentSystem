{% extends 'appointments/base.html' %}

{% block title %}Schedule Form{% endblock %}

{% block content %}
<section class="panel narrow">
    <p class="eyebrow">Schedule</p>
    <h1>{% if object %}Edit schedule{% else %}Add schedule{% endif %}</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {% include 'appointments/partials_form_fields.html' %}
        <button class="button primary" type="submit">Save schedule</button>
    </form>
</section>
{% endblock %}
